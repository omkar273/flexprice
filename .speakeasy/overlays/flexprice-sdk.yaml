overlay: 1.0.0
info:
  title: Flexprice SDK and MCP customizations
  version: 2.1.0
actions:
  - target: '$'
    update:
      x-speakeasy-retries:
        strategy: backoff
        backoff:
          initialInterval: 500
          maxInterval: 60000
          maxElapsedTime: 3600000
          exponent: 1.5
        statusCodes:
          - '408'
          - '429'
          - '5XX'
        retryConnectionErrors: true
  - target: '$.paths["/payments"]["get"]'
    update:
      x-speakeasy-pagination:
        type: offsetLimit
        inputs:
          - name: limit
            in: parameters
            type: limit
          - name: offset
            in: parameters
            type: offset
        outputs:
          results: $.items
          numResultsKey: $.pagination.total
  - target: '$.paths["/prices/units"]["get"]'
